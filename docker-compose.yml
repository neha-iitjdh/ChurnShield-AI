version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: churnshield-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=ChurnShield AI
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///./data/churnshield.db
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - churnshield-network

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: churnshield-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "src/frontend/app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - churnshield-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: churnshield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - churnshield-network
    profiles:
      - production

networks:
  churnshield-network:
    driver: bridge

volumes:
  data:
  models:
  logs:
